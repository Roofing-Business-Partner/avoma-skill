paths:
  /v1/calls/:
    get:
      description: "Returns all calls from the organization. 12344

        "
      parameters:
        - description: To retrieve calls started at or started after given date-time(UTC).
          in: query
          name: from_date
          required: true
          schema:
            format: date-time
            type: string
        - description: To retrieve calls started at or started before given date-time(UTC).
          in: query
          name: to_date
          required: true
          schema:
            format: date-time
            type: string
        - description: "- `inbound`: Get only inbound calls.

            - `outbound`: Get only outbound calls.

            "
          in: query
          name: direction
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                allOf:
                  - properties:
                      count:
                        description: Total number of records in result.
                        minimum: 0
                        type: integer
                      next:
                        description: URL to the next page if available.
                        example: https://example.com/api/v1/meeting/?page=2
                        nullable: true
                        type: string
                      previous:
                        description: URL to the previous page if available.
                        example: https://example.com/api/v1/meeting/?page=1
                        nullable: true
                        type: string
                    type: object
                  - properties:
                      results:
                        description: Actual response.
                        items:
                          properties:
                            additional_details:
                              description: Additional details of the call. This should
                                be a JSON object.
                              nullable: true
                              type: string
                            answered:
                              description: Whether the call was answered, e.g true,
                                false
                              example: "true"
                              nullable: true
                              type: boolean
                            crm_association:
                              description: CRM association object
                              example:
                                - crm_obj_id: "102721358755"
                                  crm_obj_type: contact
                                - crm_obj_id: "30447071570"
                                  crm_obj_type: account
                                - crm_obj_id: "34202467419"
                                  crm_obj_type: oppo
                              properties:
                                crm_obj_id:
                                  description: Unique identifier for the CRM object
                                  type: string
                                crm_obj_type:
                                  description: Type of CRM object
                                  type: string
                              type: array
                            direction:
                              description: Direction of the call, e.g. Inbound, Outbound
                              example: Outbound
                              maxLength: 255
                              nullable: true
                              type: string
                            end_at:
                              description: End time of the call.
                              format: date-time
                              nullable: true
                              type: string
                            external_id:
                              description: Unique id of the call from the dialer system
                                like hubspot, twilio, zoom, etc.
                              maxLength: 255
                              type: string
                            frm:
                              description: Phone number from which call was made.
                              example: "+11234567890"
                              maxLength: 255
                              nullable: true
                              type: string
                            frm_name:
                              description: Name of the caller who made the call.
                              maxLength: 255
                              nullable: true
                              type: string
                            is_voicemail:
                              default: false
                              description: Indicates if the call is a voicemail.
                              type: boolean
                            meeting:
                              properties:
                                created:
                                  format: date-time
                                  readOnly: true
                                  type: string
                                end_at:
                                  format: date-time
                                  nullable: true
                                  type: string
                                external_id:
                                  maxLength: 512
                                  type: string
                                id:
                                  readOnly: true
                                  type: integer
                                is_call:
                                  type: boolean
                                is_disclaimer_added:
                                  type: boolean
                                is_dummy:
                                  type: boolean
                                is_impromptu:
                                  type: boolean
                                is_internal:
                                  type: boolean
                                is_original:
                                  type: boolean
                                is_private:
                                  type: boolean
                                is_split_processed:
                                  type: boolean
                                location:
                                  maxLength: 512
                                  nullable: true
                                  type: string
                                meeting_url:
                                  nullable: true
                                  type: string
                                modified:
                                  format: date-time
                                  readOnly: true
                                  type: string
                                org_not_found:
                                  type: boolean
                                organization:
                                  nullable: true
                                  type: integer
                                organizer_email:
                                  format: email
                                  maxLength: 254
                                  type: string
                                original_meeting:
                                  nullable: true
                                  type: integer
                                original_model_counts:
                                  nullable: true
                                  type: object
                                original_org_count:
                                  maximum: 2147483647
                                  minimum: -2147483648
                                  type: integer
                                recurring_master:
                                  nullable: true
                                  type: integer
                                start_at:
                                  format: date-time
                                  nullable: true
                                  type: string
                                state:
                                  enum:
                                    - tentative
                                    - confirmed
                                    - cancelled
                                    - inprogress
                                    - ended
                                    - error
                                  type: string
                                subject:
                                  maxLength: 512
                                  nullable: true
