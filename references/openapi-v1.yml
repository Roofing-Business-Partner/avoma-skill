          content:
            application/json:
              schema:
                $ref: "./openapi/components/external.yml#/components/schemas/bad_request_body"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./openapi/components/external.yml#/components/schemas/http_error_response"

